# =============================================================================
# Raw Normalization Pipeline — NO TTP tagging, NO phase labels
# =============================================================================
# Replaces the Wizard Spider-specific pipeline in ai_emulation/main.tf
# for use when testing the AI Breach Watcher agent platform.
#
# This pipeline:
#   - Accepts Winlogbeat input
#   - Normalizes timestamps and host fields
#   - Parses Sysmon, Security, and PowerShell event structures
#   - Outputs clean, untagged events to Elasticsearch
# =============================================================================

input {
  beats {
    port => 5044
  }
}

filter {
  # Normalize timestamp
  if [@timestamp] {
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Normalize hostname to uppercase for consistency
  if [host][name] {
    mutate {
      uppercase => ["[host][name]"]
    }
  }

  # --- Sysmon Events ---
  if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {

    # Process Creation (Event ID 1) — extract key fields
    if [winlog][event_id] == 1 {
      mutate {
        add_field => {
          "event_category" => "process_creation"
        }
      }
    }

    # Network Connection (Event ID 3)
    if [winlog][event_id] == 3 {
      mutate {
        add_field => {
          "event_category" => "network_connection"
        }
      }
    }

    # Process Access (Event ID 10)
    if [winlog][event_id] == 10 {
      mutate {
        add_field => {
          "event_category" => "process_access"
        }
      }
    }

    # File Creation (Event ID 11)
    if [winlog][event_id] == 11 {
      mutate {
        add_field => {
          "event_category" => "file_creation"
        }
      }
    }

    # Registry Modification (Event ID 13)
    if [winlog][event_id] == 13 {
      mutate {
        add_field => {
          "event_category" => "registry_modification"
        }
      }
    }
  }

  # --- Windows Security Events ---
  if [winlog][channel] == "Security" {
    if [winlog][event_id] == 4624 {
      mutate { add_field => { "event_category" => "logon" } }
    }
    if [winlog][event_id] == 4625 {
      mutate { add_field => { "event_category" => "logon_failed" } }
    }
    if [winlog][event_id] == 4648 {
      mutate { add_field => { "event_category" => "explicit_credential" } }
    }
    if [winlog][event_id] == 4672 {
      mutate { add_field => { "event_category" => "privilege_assigned" } }
    }
    if [winlog][event_id] == 4769 {
      mutate { add_field => { "event_category" => "kerberos_tgs" } }
    }
  }

  # --- PowerShell Events ---
  if [winlog][channel] == "Microsoft-Windows-PowerShell/Operational" {
    if [winlog][event_id] == 4104 {
      mutate { add_field => { "event_category" => "powershell_scriptblock" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "winlogbeat-%{+YYYY.MM.dd}"
  }
}
