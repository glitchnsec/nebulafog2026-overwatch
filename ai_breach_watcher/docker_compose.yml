# =============================================================================
# AI Breach Watcher — Blue Team Agent Platform
# =============================================================================
# Local dev (real data):   docker compose --profile dev up --build
# Local dev (fake seed):   docker compose --profile seeded_dev up --build
# Production:              docker compose --profile prod up --build
#
# - dev:        Local ES + real ELK export loaded + backend + frontend
# - seeded_dev: Local ES + fake seed data + backend + frontend
# - prod:       Backend + frontend only (connects to existing ELK stack)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # DEV / SEEDED_DEV: Local Elasticsearch for debugging without ELK host
  # ---------------------------------------------------------------------------
  elasticsearch-dev:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: breach-watcher-es-dev
    profiles: ["dev", "seeded_dev", "prod"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es-dev-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # DEV ONLY: Load real ELK export into dev ES
  # ---------------------------------------------------------------------------
  load-elk-export:
    build:
      context: ./elk-loader
      dockerfile: Dockerfile
    container_name: breach-watcher-elk-loader
    profiles: ["dev", "prod"]
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch-dev:9200
    volumes:
      - ../ai_emulation/elk-export.tar.gz:/data/elk-export.tar.gz:ro
    depends_on:
      elasticsearch-dev:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------------------
  # SEEDED_DEV ONLY: Seed fake log data into dev ES for testing
  # ---------------------------------------------------------------------------
  seed-dev-data:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breach-watcher-seed
    profiles: ["seeded_dev"]
    command: ["python", "-m", "src.seed"]
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch-dev:9200
    depends_on:
      elasticsearch-dev:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------------------
  # DEV / SEEDED_DEV: Backend with hot-reload volume mounts
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breach-watcher-backend
    profiles: ["dev", "seeded_dev"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch-dev:9200}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-60}
      - HUNT_INTERVAL_SECONDS=${HUNT_INTERVAL_SECONDS:-300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./backend/src:/app/src
      - ./backend/.claude:/app/.claude
      - skill-versions:/app/skill-versions
    depends_on:
      elasticsearch-dev:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # DEV / SEEDED_DEV: Frontend with hot-reload volume mounts
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-dev}
    container_name: breach-watcher-ui
    profiles: ["dev", "seeded_dev"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://backend:8000}
      - VITE_WS_URL=${VITE_WS_URL:-ws://backend:8000/ws}
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PROD: Backend — no volume mounts, code baked into image
  # ---------------------------------------------------------------------------
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breach-watcher-backend
    profiles: ["prod"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch-dev:9200}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-60}
      - HUNT_INTERVAL_SECONDS=${HUNT_INTERVAL_SECONDS:-300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - skill-versions:/app/skill-versions
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PROD: Frontend — no volume mounts, code baked into image
  # ---------------------------------------------------------------------------
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-dev}
    container_name: breach-watcher-ui
    profiles: ["prod"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://backend-prod:8000}
      - VITE_WS_URL=${VITE_WS_URL:-ws://backend-prod:8000/ws}
    depends_on:
      backend-prod:
        condition: service_healthy
    restart: unless-stopped

volumes:
  es-dev-data:
  skill-versions:
